<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title>macOS Updater Suite</title>
  <desc>Rounded square icon with a clover-style updater mark.</desc>
  <defs>
    <linearGradient id="bg" x1="28" y1="20" x2="220" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.58" stop-color="#123f7b"/>
      <stop offset="1" stop-color="#0b1f16"/>
    </linearGradient>
    <linearGradient id="stroke" x1="48" y1="44" x2="200" y2="208" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7ec8ff"/>
      <stop offset="1" stop-color="#49d17d"/>
    </linearGradient>
    <linearGradient id="core" x1="76" y1="76" x2="180" y2="180" gradientUnits="userSpaceOnUse">
